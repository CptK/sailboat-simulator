graph_route_planner_node:
  ros__parameters:
    # MAP
    # KML map to plan on. Leave empty to use the map bundled in this package's
    # assets/ directory. Polygons are classified by nesting depth: a lake is
    # water, an island in it is land, a lake on that island is water again.
    map_path: ""

    # BOAT
    # The closest the boat can sail to the wind, in degrees. Legs inside this
    # angle cannot be sailed directly and are tacked instead.
    # This matches route_planner's min_tack_angle so the two plan alike. Note
    # that route_planner silently adds 5 degrees to its own value when deciding
    # whether a leg is sailable; this planner uses the number as given, because
    # it has a real polar diagram and does not need that safety fudge.
    min_tack_angle: 50

    # PLANNING CADENCE
    # How often the planner checks whether it should (re)plan, in seconds.
    # Planning is synchronous and takes ~0.1-0.6 s per leg, blocking this node.
    plan_interval: 2.0

    # REPLANNING
    # The radius around a via point within which it counts as rounded (in meters).
    # Keep this equal to route_follower's dist_threshold so both agree on progress.
    dist_threshold: 5

    # How far the boat may drift from the planned route before it is replanned
    # (in meters). A replan starts from the boat's current position and covers
    # only the via points still ahead.
    off_course_threshold: 10

    # The minimum time between two replans, in seconds, so a persistent trigger
    # cannot thrash the planner.
    min_time_between_replanning: 5.0

    # SEARCH
    # Clearance kept from the shoreline and from every island (in meters).
    margin: 2.0

    # Spacing of the open-water waypoint grid used for tacking (in meters).
    # Smaller is more accurate and much slower: cost grows with the square.
    grid_spacing: 6.0

    # Nodes closer together than this are merged into one (in meters). 0 disables.
    merge_threshold: 1.5

    # Shortest leg the planner will consider (in meters). 0 disables.
    # Raising it suppresses fiddly hops, but it filters edges, so a high value
    # can disconnect the graph and leave no route at all.
    min_leg_distance: 0.0

    # Longest leg the planner will consider (in meters).
    # 0 derives it from the map, which is the only value that never truncates a
    # leg the boat could actually sail. A fixed limit below the map's longest
    # crossing silently forces detours through waypoints that are not needed.
    max_leg_distance: 0.0

    # If inputs (mission, position, wind) are missing, the node warns. This is the
    # minimum time between two such warnings in seconds, to avoid flooding the log.
    time_between_missing_values_logs: 10.0
